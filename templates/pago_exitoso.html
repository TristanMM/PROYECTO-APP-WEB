<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pago exitoso — Okami Fit</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/carrito.css') }}">
</head>
<body>
    <main class="cart-main" style="text-align:center; padding-top: 80px;">
        <div style="font-size: 64px; margin-bottom: 20px;">✅</div>
        <h1 style="color: #6bcb77; margin-bottom: 12px;">¡Pago confirmado!</h1>
        <p style="color: #aaa; margin-bottom: 8px;">Gracias por tu compra en Okami Fit.</p>
        {% if orden %}
            <p style="color: #777; font-size: 14px;">Orden # {{ orden.orden_id }}</p>
        {% endif %}
        <a href="/" class="go-shop-btn" style="display:inline-block; margin-top: 32px;">
            Volver a la tienda
        </a>
    </main>
</body>
</html>
